name: Build CLI

# Builds the SimpleCircuit command-line tool as self-contained, single-file
# executables for Windows/Linux/macOS and attaches them to a GitHub Release.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v2.4.2 && git push origin v2.4.2
#
# The resulting assets get stable "latest release" download URLs, e.g.:
#   https://github.com/svenboulanger/SimpleCircuit/releases/latest/download/SimpleCircuit-win-x64.zip
# which is what the Claude skill points users at.
#
# workflow_dispatch also runs it on demand (no Release; outputs land as
# downloadable workflow artifacts instead).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish SimpleCircuit/SimpleCircuit.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish/${{ matrix.rid }}

      - name: Package
        id: package
        run: |
          set -euo pipefail
          cd "publish/${{ matrix.rid }}"
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            asset="SimpleCircuit-${{ matrix.rid }}.zip"
            zip -j "${GITHUB_WORKSPACE}/${asset}" SimpleCircuit.exe
          else
            asset="SimpleCircuit-${{ matrix.rid }}.tar.gz"
            chmod +x SimpleCircuit
            tar -czf "${GITHUB_WORKSPACE}/${asset}" SimpleCircuit
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleCircuit-${{ matrix.rid }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
